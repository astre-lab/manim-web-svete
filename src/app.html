<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="text-scale" content="scale" />
    <meta name="google-site-verification" content="R0h7wrN2yf5k8iv8-coZa_PdaOw_aPu3PYXlRLhqpzs" />

    <!-- Runs synchronously, before first paint: sets theme from cookie, -->
    <!-- falling back to prefers-color-scheme. No FOUC. -->
    <script>
      (function () {
        try {
          var match = localStorage.getItem(DARK_KEY);
          var theme = match ? decodeURIComponent(match[1]) : null;

          if (theme !== "dark" && theme !== "light") {
            theme =
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          }

          var root = document.documentElement;
          root.classList.add(theme);
          root.style.colorScheme = theme;
          root.style.backgroundColor = theme === "dark" ? "#000000" : "#ffffff";
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <style>
      /* Loader overlay — sits above everything until the app hydrates */
      #__loading_screen {
        position: fixed;
        inset: 0;
        z-index: 999999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #000000;
      }
      html.light #__loading_screen {
        background-color: #ffffff;
      }
      #__loading_screen.__fade-out {
        opacity: 0;
        transition: opacity 0.25s ease-out;
        pointer-events: none;
      }

      /* From Uiverse.io by jeremyssocial */
      @keyframes blinkCursor {
        50% {
          border-right-color: transparent;
        }
      }

      @keyframes typeAndDelete {
        0%,
        10% {
          width: 0;
        }
        45%,
        55% {
          width: 6.2em;
        }
        90%,
        100% {
          width: 0;
        }
      }

      .terminal-loader {
        border: 0.1em solid #333;
        background-color: #1a1a1a;
        color: #0f0;
        font-family: "Courier New", Courier, monospace;
        font-size: 1em;
        padding: 1.5em 1em;
        width: 12em;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        border-radius: 4px;
        position: relative;
        overflow: hidden;
        box-sizing: border-box;
      }

      .terminal-header {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1.5em;
        background-color: #333;
        border-top-left-radius: 4px;
        border-top-right-radius: 4px;
        padding: 0 0.4em;
        box-sizing: border-box;
      }

      .terminal-controls {
        float: right;
      }

      .control {
        display: inline-block;
        width: 0.6em;
        height: 0.6em;
        margin-left: 0.4em;
        border-radius: 50%;
        background-color: #777;
      }

      .control.close {
        background-color: #e33;
      }
      .control.minimize {
        background-color: #ee0;
      }
      .control.maximize {
        background-color: #0b0;
      }

      .terminal-title {
        float: left;
        line-height: 1.5em;
        color: #eee;
      }

      .text {
        display: inline-block;
        white-space: nowrap;
        overflow: hidden;
        border-right: 0.2em solid green;
        animation:
          typeAndDelete 4s steps(11) infinite,
          blinkCursor 0.5s step-end infinite alternate;
        margin-top: 1.5em;
      }
    </style>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>

    <div id="__loading_screen">
      <div class="terminal-loader">
        <div class="terminal-header">
          <div class="terminal-title">Status</div>
          <div class="terminal-controls">
            <div class="control close"></div>
            <div class="control minimize"></div>
            <div class="control maximize"></div>
          </div>
        </div>
        <div class="text">Loading...</div>
      </div>
    </div>

    <script>
      (function () {
        var loader = document.getElementById("__loading_screen");
        if (!loader) return;

        var target = document.querySelector(
          '[data-sveltekit-preload-data="hover"] > div'
        );

        function remove() {
          if (!loader || loader.dataset.removed) return;
          loader.dataset.removed = "1";
          loader.classList.add("__fade-out");
          setTimeout(function () {
            loader.remove();
          }, 300);
        }

        // Remove as soon as SvelteKit hydrates real content into the target.
        if (target) {
          var observer = new MutationObserver(function () {
            if (target.childNodes.length > 0) {
              observer.disconnect();
              remove();
            }
          });
          observer.observe(target, { childList: true });

          // In case content is already there by the time this runs.
          if (target.childNodes.length > 0) remove();
        }

        // Hard fallback so the loader never gets stuck.
        window.addEventListener("load", function () {
          setTimeout(remove, 50);
        });
        setTimeout(remove, 6000);
      })();
    </script>
  </body>
</html>
